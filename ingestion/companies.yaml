# Seed registry for the NA tech-hiring ingest pipeline.
#
# Verified live during Phase 1.5 expansion via `python -m scripts.probe_handles`.
# Job counts in the trailing comments are from that probe — drift over time is
# normal; the orchestrator's per-company stats record current reality.
#
# Schema:
#   slug: stable internal identifier (used in `id = sha256(slug+url)[:16]`)
#   name: display name
#   provider: greenhouse | lever | ashby   (workable + smartrecruiters in Phase 4)
#   handle: ATS-specific board key
#   default_country: fallback when location string is ambiguous (US|CA)
#
# When an ATS handle 404s, the orchestrator logs and skips. Re-run the probe
# script when you want to add or refresh entries.

