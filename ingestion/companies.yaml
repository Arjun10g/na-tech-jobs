# Seed registry for Phase 1 ingestion.
#
# - 50+ North American tech companies, mix of US + Canadian, mix of providers.
# - `slug`: stable identifier used in the dataset (sha256 of slug+url → job id).
# - `provider`: one of greenhouse | lever | ashby (workable + smartrecruiters in Phase 4, workday in Phase 4+).
# - `handle`: the company's public ATS handle (subdomain or board key).
# - `default_country`: fallback for ambiguous "Remote" postings.
#
# When an ATS handle 404s, the extractor logs and skips — pruning happens after
# the first run reports per-company stats.

companies:
