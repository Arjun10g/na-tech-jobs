name: Deploy to HF Space

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "rag/**"
      - "models/**"
      - "curated/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-space.yml"
  workflow_dispatch:

concurrency:
  group: deploy-space
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_USER: arjun10g
      HF_SPACE: arjun10g/na-tech-jobs

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate requirements.txt for Space (Python 3.10 base, +space-runtime extras)
        run: |
          uv export \
            --no-dev \
            --no-hashes \
            --no-emit-project \
            --extra space-runtime \
            --python 3.10 \
            --format requirements-txt \
            > requirements.txt

      - name: Clone Space repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" space-repo

      - name: Sync runtime files into Space
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.venv/' \
            --exclude='.claude/' \
            --exclude='.pre-commit-config.yaml' \
            --exclude='.python-version' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='uv.lock' \
            --exclude='tests/' \
            --exclude='notebooks/' \
            --exclude='infra/' \
            --exclude='mlruns/' \
            --exclude='qdrant_storage/' \
            --exclude='data/' \
            --exclude='eda/' \
            --exclude='curated/' \
            --exclude='monitoring/' \
            --exclude='scripts/' \
            --exclude='space-repo/' \
            --exclude='CLAUDE.md' \
            --exclude='MAINTENANCE.md' \
            --exclude='LITERATURE_REVIEW.md' \
            --exclude='DATA_DICTIONARY.md' \
            --exclude='README.md' \
            ./ space-repo/

      - name: Carry over runtime files needed by the Space
        run: |
          # Drop the parts of ingestion/ the Space doesn't need (extractors,
          # orchestrator, push_to_hub, etc.) — keep only feature_extraction/
          # and schema.py + normalize.py for parsing pasted job descriptions.
          if [ -d space-repo/ingestion ]; then
            cd space-repo/ingestion
            ls | grep -vE '^(__init__\.py|schema\.py|normalize\.py|feature_extraction)$' \
              | xargs -r rm -rf
            cd "$GITHUB_WORKSPACE"
          fi

      - name: Write Space-flavored README with Gradio frontmatter
        run: |
          cat > space-repo/README.md <<'EOF'
          ---
          title: na-tech-jobs
          emoji: 🛰️
          colorFrom: indigo
          colorTo: blue
          sdk: gradio
          sdk_version: 5.49.1
          app_file: app/main.py
          pinned: false
          license: mit
          ---

          # na-tech-jobs

          Production ML platform for the North American senior tech-hiring market.

          Source code & full project bible: https://github.com/Arjun10g/na-tech-jobs
          EOF

      - name: Commit and push to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        working-directory: space-repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No Space changes; skipping push."
            exit 0
          fi
          git commit -m "deploy: sync from github.com/Arjun10g/na-tech-jobs@${GITHUB_SHA::7}"
          git push "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" HEAD:main
